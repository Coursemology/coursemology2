# Run the ConsolidatedItemEmailJob for opening reminders on the 5th minute of each hour.
consolidated_item_email_job:
  cron: '5 * * * *'
  class: 'ConsolidatedItemEmailJob'
  queue: 'default'

# Run the VideoStatisticUpdateJob every day at 21:30 UTC, 5:30 AM SGT
video_statistic_update_job:
  cron: '30 21 * * *'
  class: 'VideoStatisticUpdateJob'
  queue: 'default'

# Run the UserEmailDatabaseCleanupJob every month
user_email_database_cleanup_job:
  cron: '0 0 1 * *'
  class: 'UserEmailDatabaseCleanupJob'
  queue: 'default'

# Reap expired marketplace preview attempts once a day at 22:00 UTC, 6:00 AM SGT.
preview_attempt_reaping_job:
  cron: '0 22 * * *'
  class: 'Course::Assessment::PreviewAttemptReapingJob'
  queue: 'default'
