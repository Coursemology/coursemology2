name: coursmeology_authentication
services:
  coursemology_auth:
    container_name: coursemology_authentication
    ports:
      - 8443:8080
    environment:
      # - KEYCLOAK_IMPORT= /opt/jboss/keycloak/imports/coursemology_realm.json
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=password
    volumes:
      - ./import/coursemology_realm.json:/opt/keycloak/data/import/coursemology_realm.json
      - ./singular-keycloak-database-federation/dist:/opt/keycloak/providers
    image: coursemology_auth
    command: start-dev --import-realm
